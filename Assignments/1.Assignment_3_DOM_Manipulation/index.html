<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Implementation</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/Explanation/3.JavaScript/assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <header>
        <div class="greetings">
            <h2 id="heading">Hello,</h2>
        </div>
    </header>
    <main>
        <div class="boxes">
            <div class="box" id="redBox">Red</div>
            <div class="box" id="blueBox">Blue</div>
            <div class="box" id="greenBox">Green</div>
            <div class="box" id="yellowBox">Yellow</div>
        </div>

        <div class="inputbox">
            <form action="">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="submit" name="submit" id="submit" value="Greet">
            </form>
            
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
