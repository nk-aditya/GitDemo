<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Handling in JS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/Explanation/3.JavaScript/assets/favicon.ico" type="image/x-icon">
</head>
<body>
    <h2>Event Listeners</h2>
    <div class="container" id="cont">
        <div class="box" id="box-1">box-1</div>
        <div class="box" id="box-2" onclick="onClickFunc()">box-2</div>
        <div class="box" id="box-3" onmouseover ="onHover()">box-3</div>
        <div class="box" id="box-4">box-4</div>
        <div class="box" id="box-5">box-5</div>
    </div>

    <form action="#">
        <input type="text" onkeypress="onKeyPress()">
    </form>
    <script src="script.js"></script>
</body>
</html>
